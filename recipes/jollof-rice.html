        <p>This recipe makes about 3 servings of the meal.</p>
        
        <ul>
            <li>3 cups <strong>parboiled rice</strong>.</li>
            <li>1/8 cup of <strong>vegetable or sunflower oil</strong>.</li>
            <li>400g <strong>canned or packaged tomato</strong>.</li>
            <li>1 large or 2 medium sized <strong>onions</strong>.</li>
            <li>4 large <strong>red paprika</strong>.</li>
            <li>2 <strong>scotch bonnet pepper</strong> (or some other hot pepper).</li>
