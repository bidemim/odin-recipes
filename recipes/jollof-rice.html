    <h1>Jollof Rice</h1>
        <h3>Ingredients</h3>
        <p>This recipe makes about 3 servings of the meal.</p>
        
        <ul>
            <li>3 cups parboiled rice.</li>
            <li>Vegetable or sunflower oil.</li>
            <li>1 canned or packed tomato.</li>
            <li>1 large or 2 medium sized <strong>onions</strong>.</li>
            <li>4 large red paprikas.</li>
            <li>3 <strong>habanero</strong> (or some other hot pepper).</li>
            <li>1 lb lamb.</li>
        </ul>
